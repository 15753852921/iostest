name: Build STRLite MNN iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "unsigned: for Sideloadly/AltStore local signing; signed: use Apple signing secrets"
        required: true
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - signed
      bundle_id:
        description: "Bundle id used only for signed builds"
        required: false
        default: "com.chenxuan.strlite.mnn"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Check deployment model
        run: |
          test -f deploy/strlite_video_t4_360x640.mnn
          ls -lh deploy/strlite_video_t4_360x640.mnn

      - name: Clone MNN
        run: |
          git clone --depth 1 https://github.com/alibaba/MNN.git MNN
      - name: Patch MNN Metal ROIAlign link issue
        run: |
          perl -0pi -e 's/\n\s*extern void ___MetalROIAlignCreator__OpType_ROIAlign__\(\);//g; s/\n\s*___MetalROIAlignCreator__OpType_ROIAlign__\(\);//g' MNN/source/backend/metal/MetalOPRegister.mm
          grep -n "ROIAlign" MNN/source/backend/metal/MetalOPRegister.mm || true

      - name: Put STRLite model into official demo resource slot
        run: |
          mkdir -p MNN/resource/model/MobileNet/v2
          cp deploy/strlite_video_t4_360x640.mnn MNN/resource/model/MobileNet/v2/mobilenet_v2.caffe.mnn

      - name: Show Xcode schemes
        run: |
          xcodebuild -list -project MNN/project/ios/MNN.xcodeproj

      - name: Prepare Apple signing assets
        if: ${{ inputs.build_mode == 'signed' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Build unsigned app
        if: ${{ inputs.build_mode == 'unsigned' }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project MNN/project/ios/MNN.xcodeproj \
            -scheme demo \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            clean build
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path '*Release-iphoneos/demo.app' -type d | head -1)
          test -n "$APP_PATH"
          mkdir -p unsigned/Payload
          cp -R "$APP_PATH" unsigned/Payload/demo.app
          (cd unsigned && zip -qry ../STRLite-MNN-demo-unsigned.ipa Payload)
          ls -lh STRLite-MNN-demo-unsigned.ipa

      - name: Build signed archive
        if: ${{ inputs.build_mode == 'signed' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ inputs.bundle_id }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project MNN/project/ios/MNN.xcodeproj \
            -scheme demo \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/STRLiteMNN.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            clean archive

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key><string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$PWD/build/STRLiteMNN.xcarchive" \
            -exportPath "$PWD/signed" \
            -exportOptionsPlist ExportOptions.plist
          ls -lh signed/*.ipa

      - name: Upload unsigned IPA
        if: ${{ inputs.build_mode == 'unsigned' }}
        uses: actions/upload-artifact@v4
        with:
          name: STRLite-MNN-demo-unsigned-ipa
          path: STRLite-MNN-demo-unsigned.ipa

      - name: Upload signed IPA
        if: ${{ inputs.build_mode == 'signed' }}
        uses: actions/upload-artifact@v4
        with:
          name: STRLite-MNN-demo-signed-ipa
          path: signed/*.ipa
